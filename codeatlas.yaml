entry_points:
  files:
    - backend/app/main.py

ignore:
  directories:
    - migrations
    - tests
    - __pycache__
    - .pytest_cache
    - .ruff_cache
    - .mypy_cache
    - .venv

architecture:
  layers:
    api:
      patterns:
        - backend.app.api
        - backend.app.api.*
      may_depend_on:
        - services

    services:
      patterns:
        - backend.app.services
        - backend.app.services.*
      may_depend_on:
        - repositories

    repositories:
      patterns:
        - backend.app.repositories
        - backend.app.repositories.*
      may_depend_on:
        - models

    models:
      patterns:
        - backend.app.models
        - backend.app.models.*